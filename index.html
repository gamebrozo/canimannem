<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #fff5f5; font-family: sans-serif; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; }
        .heart { font-size: 60px; color: #ff4d4d; cursor: pointer; animation: beat 1.5s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .btn { background: #ff4d4d; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="heart" onclick="baslat()">❤️</div>
    <h1>Canım Annem</h1>
    <p id="t">Senin için bir şarkı seçtim...</p>
    
    <!-- Senin yüklediğin dosya burada çalışacak -->
    <audio id="m" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <button class="btn" onclick="baslat()" id="b">Müziği Başlat 🎵</button>
</div>

<script>
    function baslat() {
        var m = document.getElementById('m');
        var b = document.getElementById('b');
        if (m.paused) {
            m.play();
            b.innerText = "Durdur";
            document.getElementById('t').innerText = "Seni Çok Seviyorum!";
        } else {
            m.pause();
            b.innerText = "Müziği Başlat 🎵";
        }
    }
</script>

</body>
</html>
