<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #fff5f5 0%, #ffe3e3 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Arkaplan Kalp Yağmuru */
        .particle {
            position: absolute;
            color: rgba(255, 107, 107, 0.3);
            pointer-events: none;
            animation: float 6s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4);
            text-align: center;
            width: 85%;
            max-width: 380px;
            z-index: 10;
            border: 2px solid white;
        }

        .heart-icon {
            font-size: 80px;
            color: #ff6b6b;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63031;
            font-size: 2.8rem;
            margin: 15px 0;
        }

        #message {
            font-size: 1.2rem;
            color: #636e72;
            min-height: 70px;
            margin: 20px 0;
            font-style: italic;
            transition: opacity 0.8s ease-in-out;
        }

        .btn {
            background: #d63031;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(214, 48, 49, 0.3);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="card">
        <div class="heart-icon" onclick="startSurprise()">❤️</div>
        <h1>Canım Annem</h1>
        <p id="message">Gözlerini kapat ve bu melodiyi dinle...</p>

        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
        </audio>

        <button class="btn" onclick="startSurprise()" id="btnText">Sürprizi Başlat 🎵</button>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('btnText');
        const msg = document.getElementById('message');
        
        const notes = [
            "Varlığın benim en büyük şansım...",
            "Senin sevginle her günüm bayram.",
            "Dünyanın en güzel annesi, iyi ki varsın.",
            "Seni sonsuza kadar çok seveceğim ❤️"
        ];
        let i = 0;

        function startSurprise() {
            if (audio.paused) {
                audio.play();
                btn.innerText = "Durdur ⏸";
                createParticles();
                
                setInterval(() => {
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.innerText = notes[i];
                        msg.style.opacity = 1;
                        i = (i + 1) % notes.length;
                    }, 800);
                }, 4500);
            } else {
                audio.pause();
                btn.innerText = "Devam Ettir 🎵";
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerText = '❤️';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    p.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    container.appendChild(p);
                }, i * 300);
            }
        }
    </script>
</body>
</html>
